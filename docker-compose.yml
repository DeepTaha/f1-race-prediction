version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-prediction-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - ARTIFACTS_DIR=artifacts
      - DATASET_DIR=dataset
    volumes:
      - ./artifacts:/app/artifacts
      - ./dataset:/app/dataset
    restart: unless-stopped
    networks:
      - f1-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: ./dashboard
    container_name: f1-prediction-dashboard
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped
    networks:
      - f1-network

networks:
  f1-network:
    driver: bridge
